<!DOCTYPE html>
<html  lang="en">
    <head>
        <title>count</title>
        <script>
            let counter=0;
            function count(){
                counter++;
                alert(counter);
            }
            
        </script>
    </head>
    <body>
        <h1>Hello!</h1>
        <br><br>
        <button onclick="count( )">Count</button>
    </body>
</html>
